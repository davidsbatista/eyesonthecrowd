<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eyes on the Crowd</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #060410;
      --white: #f5f0ff;
      --mid: #7a6a99;
      --dim: #2a1f3d;
      --c1: #ff3cac;
      --c2: #ffed00;
      --c3: #00ffc3;
      --c4: #784dff;
      --c5: #ff7b00;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--white);
      font-family: 'DM Mono', monospace;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 2.5rem clamp(1.5rem, 5vw, 5rem);
      overflow: hidden;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      opacity: 0.85;
    }

    nav, main, footer { position: relative; z-index: 1; }

    nav {
      display: flex;
      justify-content: space-between;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--mid);
    }

    nav .dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      margin-right: 0.6em;
      animation: dotcolor 4s linear infinite, pulse 2s ease-in-out infinite;
    }

    @keyframes dotcolor {
      0%   { background: #ff3cac; }
      25%  { background: #ffed00; }
      50%  { background: #00ffc3; }
      75%  { background: #784dff; }
      100% { background: #ff3cac; }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(5rem, 18vw, 18rem);
      line-height: 0.85;
      letter-spacing: -0.01em;
      opacity: 0;
      animation: up 0.9s ease 0.2s forwards;
    }

    h1 .w1 { color: #50c878; }
    h1 .w2 { color: var(--white); }
    h1 .w3 { color: #ffd700; }
    h1 .w4 {
      display: inline-block;
      animation: hueshift 6s linear infinite;
    }

    @keyframes hueshift {
      0%   { color: #ff6432; text-shadow: 0 0 50px rgba(255,100,50,0.4); }
      25%  { color: #c850ff; text-shadow: 0 0 50px rgba(200,80,255,0.4); }
      50%  { color: #ffd700; text-shadow: 0 0 50px rgba(255,215,0,0.4); }
      75%  { color: #50c878; text-shadow: 0 0 50px rgba(80,200,120,0.4); }
      100% { color: #ff6432; text-shadow: 0 0 50px rgba(255,100,50,0.4); }
    }

    .sub {
      margin-top: 2rem;
      font-size: clamp(0.75rem, 1.2vw, 0.9rem);
      line-height: 1.9;
      color: var(--mid);
      max-width: 480px;
      opacity: 0;
      animation: up 0.9s ease 0.5s forwards;
    }

    @keyframes up {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    footer {
      display: flex;
      justify-content: space-between;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--dim);
      opacity: 0;
      animation: up 0.9s ease 0.8s forwards;
    }
  </style>
</head>
<body>

  <canvas id="bg"></canvas>

  <nav>
    <span><span class="dot"></span>Eyes on the Crowd</span>
    <span>Manifesto — Coming Soon</span>
  </nav>

  <main>
    <h1>
      <span class="w1">Eyes on</span><br>
      <span class="w2">the Crowd.</span><br>
      <span class="w3">Connect.</span><br>
      <span class="w4">Dance.</span>
    </h1>
    <p class="sub">
      The real show is the crowd. Free, facing each other. Not the DJ booth.
    </p>
  </main>

  <footer>
    <span>eyesonthecrowd.com</span>
    <span>2025</span>
  </footer>

  <script>
    const canvas = document.getElementById('bg');
    const ctx = canvas.getContext('2d');
    let W, H, t = 0;

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    // Fractal-like organic blobs using layered sinusoidal deformation
    // Each "petal" is a polar curve r = f(theta, time) drawn as a closed path

    const layers = [
      { cx: 0.15, cy: 0.35, r: 0.38, petals: 3, speed: 0.00017, phase: 0,    color: [255, 100, 50],  alpha: 0.18 },
      { cx: 0.75, cy: 0.25, r: 0.32, petals: 4, speed: 0.00013, phase: 1.2,  color: [255, 210, 0],   alpha: 0.18 },
      { cx: 0.55, cy: 0.72, r: 0.35, petals: 3, speed: 0.00019, phase: 2.4,  color: [80, 200, 120],  alpha: 0.16 },
      { cx: 0.85, cy: 0.65, r: 0.28, petals: 5, speed: 0.00011, phase: 0.8,  color: [220, 80, 180],  alpha: 0.15 },
      { cx: 0.30, cy: 0.80, r: 0.30, petals: 4, speed: 0.00015, phase: 3.0,  color: [255, 150, 0],   alpha: 0.16 },
      { cx: 0.65, cy: 0.15, r: 0.25, petals: 6, speed: 0.00021, phase: 1.7,  color: [100, 180, 255], alpha: 0.15 },
      { cx: 0.42, cy: 0.48, r: 0.18, petals: 7, speed: 0.00025, phase: 0.5,  color: [200, 80, 255],  alpha: 0.16 },
      { cx: 0.20, cy: 0.60, r: 0.15, petals: 5, speed: 0.00022, phase: 2.1,  color: [255, 80, 120],  alpha: 0.14 },
      { cx: 0.80, cy: 0.50, r: 0.20, petals: 6, speed: 0.00018, phase: 1.0,  color: [60, 220, 180],  alpha: 0.14 },
      { cx: 0.50, cy: 0.30, r: 0.28, petals: 4, speed: 0.00014, phase: 4.2,  color: [255, 180, 50],  alpha: 0.15 },
      { cx: 0.10, cy: 0.15, r: 0.22, petals: 5, speed: 0.00020, phase: 0.3,  color: [180, 100, 255], alpha: 0.14 },
      { cx: 0.90, cy: 0.85, r: 0.25, petals: 3, speed: 0.00016, phase: 2.8,  color: [120, 220, 80],  alpha: 0.14 },
    ];

    function drawOrganic(layer, time) {
      const cx = layer.cx * W;
      const cy = layer.cy * H;
      const baseR = layer.r * Math.min(W, H);
      const { petals, speed, phase, color, alpha } = layer;
      const steps = 360;
      const [r, g, b] = color;

      ctx.beginPath();
      for (let i = 0; i <= steps; i++) {
        const theta = (i / steps) * Math.PI * 2;
        const t2 = time * speed;

        // layered deformation: main petal shape + harmonic wobble + slow drift
        const petal    = Math.abs(Math.cos(petals * 0.5 * theta + phase + t2 * 1.3));
        const wobble1  = 1 + 0.18 * Math.sin(theta * (petals + 1) + t2 * 2.1 + phase);
        const wobble2  = 1 + 0.09 * Math.sin(theta * (petals * 2 + 1) + t2 * 3.3);
        const wobble3  = 1 + 0.05 * Math.cos(theta * (petals * 3) + t2 * 1.7 + phase * 2);

        const rad = baseR * (0.4 + 0.6 * petal) * wobble1 * wobble2 * wobble3;
        const x = cx + rad * Math.cos(theta);
        const y = cy + rad * Math.sin(theta);

        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.closePath();

      // radial gradient fill for each blob — soft glow from centre
      const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, baseR);
      grad.addColorStop(0,   `rgba(${r},${g},${b},${alpha * 2.5})`);
      grad.addColorStop(0.5, `rgba(${r},${g},${b},${alpha})`);
      grad.addColorStop(1,   `rgba(${r},${g},${b},0)`);
      ctx.fillStyle = grad;
      ctx.fill();
    }

    function frame(timestamp) {
      ctx.clearRect(0, 0, W, H);
      for (const layer of layers) drawOrganic(layer, timestamp);
      requestAnimationFrame(frame);
    }

    requestAnimationFrame(frame);
  </script>
</body>
</html>
